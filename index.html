
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/cash-wallet-icon.svg" />
    <link rel="apple-touch-icon" href="/cash-wallet-icon.svg" />
    <link rel="alternate icon" href="/cash-wallet-icon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover, interactive-widget=resizes-content" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Smart Savings" />
    <meta name="theme-color" content="#1DB584" />
    <meta name="color-scheme" content="light" />

    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <title>Smart Savings</title>

    <style>
      /* Enhanced Mobile Optimizations */
      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      /* Prevent zoom on form inputs while allowing user zoom */
      input[type="text"], input[type="number"], input[type="email"], input[type="password"], select, textarea {
        font-size: max(16px, 1rem) !important;
        transform: translateZ(0); /* Force hardware acceleration */
      }

      /* Enhanced mobile rendering */
      html {
        -webkit-text-size-adjust: 100%;
        -ms-text-size-adjust: 100%;
        text-size-adjust: 100%;
        touch-action: manipulation;
        scroll-behavior: smooth;
      }

      body {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
        overflow-x: hidden;
        width: 100%;
        position: relative;
        min-height: 100vh;
        min-height: 100dvh; /* Dynamic viewport height */
      }

      /* Improved touch targets */
      button, [role="button"], input[type="submit"], input[type="button"] {
        min-height: 44px;
        min-width: 44px;
        touch-action: manipulation;
      }

      /* Better scrolling performance */
      .scroll-container {
        -webkit-overflow-scrolling: touch;
        overscroll-behavior: contain;
      }

      /* Prevent layout shift */
      img, video {
        max-width: 100%;
        height: auto;
      }

      /* Loading state optimization */
      .loading-skeleton {
        background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
        background-size: 200% 100%;
        animation: loading 1.5s infinite;
      }

      @keyframes loading {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
