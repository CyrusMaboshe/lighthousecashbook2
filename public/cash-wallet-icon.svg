<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glass-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.05" />
    </linearGradient>
    <linearGradient id="accent-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2dd4bf;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Base -->
  <rect width="512" height="512" rx="128" fill="url(#bg-gradient)" />
  
  <!-- Subtle inner glow -->
  <rect x="20" y="20" width="472" height="472" rx="110" fill="none" stroke="white" stroke-opacity="0.05" stroke-width="2" />

  <!-- Animated-like Glow behind the piggy -->
  <circle cx="256" cy="240" r="120" fill="#3b82f6" fill-opacity="0.15" filter="url(#glow)" />

  <!-- Glass Piggy Bank Icon Base -->
  <g transform="translate(128, 128) scale(0.5)">
    <!-- Body -->
    <path d="M448 240c0-106-86-192-192-192S64 134 64 240s86 192 192 192s192-86 192-192z" fill="url(#glass-gradient)" stroke="white" stroke-opacity="0.2" stroke-width="8" />
    
    <!-- Ear -->
    <path d="M128 128l-32-64 64 32z" fill="url(#glass-gradient)" stroke="white" stroke-opacity="0.2" stroke-width="4" />
    <path d="M384 128l32-64-64 32z" fill="url(#glass-gradient)" stroke="white" stroke-opacity="0.2" stroke-width="4" />
    
    <!-- Nose/Snout -->
    <circle cx="256" cy="280" r="40" fill="url(#glass-gradient)" stroke="white" stroke-opacity="0.2" stroke-width="8" />
    <circle cx="240" cy="280" r="8" fill="white" fill-opacity="0.3" />
    <circle cx="272" cy="280" r="8" fill="white" fill-opacity="0.3" />

    <!-- Coin Slot -->
    <rect x="216" y="80" width="80" height="20" rx="10" fill="#0f172a" stroke="white" stroke-opacity="0.1" stroke-width="4" />
  </g>

  <!-- Glowing Accent Coin -->
  <circle cx="256" cy="180" r="30" fill="url(#accent-gradient)" filter="url(#glow)" />
  <text x="256" y="192" font-family="Arial" font-size="34" font-weight="bold" fill="white" text-anchor="middle">$</text>

  <!-- Brand Text -->
  <text x="256" y="440" font-family="Arial" font-size="36" font-weight="900" fill="white" text-anchor="middle" letter-spacing="2">SMART SAVINGS</text>
  <text x="256" y="475" font-family="Arial" font-size="16" font-weight="bold" fill="#94a3b8" text-anchor="middle" letter-spacing="4">LIGHTHOUSE MEDIA</text>
  
  <!-- Glass Reflection -->
  <path d="M100 100 Q 256 50 412 100" fill="none" stroke="white" stroke-opacity="0.1" stroke-width="4" />
</svg>
