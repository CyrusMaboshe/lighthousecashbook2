<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Piggy Bank Body -->
  <ellipse cx="16" cy="18" rx="12" ry="8" fill="#FFB6C1" stroke="#FF69B4" stroke-width="1"/>
  
  <!-- Piggy Bank Head -->
  <circle cx="16" cy="12" r="6" fill="#FFB6C1" stroke="#FF69B4" stroke-width="1"/>
  
  <!-- Eyes -->
  <circle cx="14" cy="10" r="1" fill="#000"/>
  <circle cx="18" cy="10" r="1" fill="#000"/>
  
  <!-- Snout -->
  <ellipse cx="16" cy="14" rx="2" ry="1.5" fill="#FF69B4"/>
  <circle cx="15" cy="14" r="0.3" fill="#000"/>
  <circle cx="17" cy="14" r="0.3" fill="#000"/>
  
  <!-- Ears -->
  <ellipse cx="12" cy="8" rx="1.5" ry="2" fill="#FFB6C1" stroke="#FF69B4" stroke-width="0.5"/>
  <ellipse cx="20" cy="8" rx="1.5" ry="2" fill="#FFB6C1" stroke="#FF69B4" stroke-width="0.5"/>
  
  <!-- Legs -->
  <rect x="8" y="24" width="2" height="4" fill="#FF69B4"/>
  <rect x="12" y="24" width="2" height="4" fill="#FF69B4"/>
  <rect x="18" y="24" width="2" height="4" fill="#FF69B4"/>
  <rect x="22" y="24" width="2" height="4" fill="#FF69B4"/>
  
  <!-- Coin Slot -->
  <rect x="15" y="16" width="2" height="0.5" fill="#FF1493"/>
  
  <!-- Tail -->
  <path d="M 28 18 Q 30 16 28 14" stroke="#FF69B4" stroke-width="2" fill="none"/>
  
  <!-- Dollar Sign -->
  <text x="16" y="20" font-family="Arial, sans-serif" font-size="4" font-weight="bold" text-anchor="middle" fill="#228B22">$</text>
</svg>
