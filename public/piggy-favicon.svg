<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="piggyGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB6C1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF69B4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="coinGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA500;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="32" cy="32" r="30" fill="url(#piggyGradient)" stroke="#FF1493" stroke-width="2"/>
  
  <!-- Piggy Bank Body -->
  <ellipse cx="32" cy="36" rx="20" ry="14" fill="#FFB6C1" stroke="#FF69B4" stroke-width="1.5"/>
  
  <!-- Piggy Bank Head -->
  <circle cx="32" cy="24" r="10" fill="#FFB6C1" stroke="#FF69B4" stroke-width="1.5"/>
  
  <!-- Eyes -->
  <circle cx="28" cy="20" r="2" fill="#000"/>
  <circle cx="36" cy="20" r="2" fill="#000"/>
  <circle cx="28.5" cy="19.5" r="0.5" fill="#FFF"/>
  <circle cx="36.5" cy="19.5" r="0.5" fill="#FFF"/>
  
  <!-- Snout -->
  <ellipse cx="32" cy="28" rx="4" ry="3" fill="#FF69B4"/>
  <circle cx="30" cy="28" r="0.8" fill="#000"/>
  <circle cx="34" cy="28" r="0.8" fill="#000"/>
  
  <!-- Ears -->
  <ellipse cx="24" cy="16" rx="3" ry="4" fill="#FFB6C1" stroke="#FF69B4" stroke-width="1"/>
  <ellipse cx="40" cy="16" rx="3" ry="4" fill="#FFB6C1" stroke="#FF69B4" stroke-width="1"/>
  
  <!-- Legs -->
  <rect x="16" y="48" width="4" height="8" rx="2" fill="#FF69B4"/>
  <rect x="24" y="48" width="4" height="8" rx="2" fill="#FF69B4"/>
  <rect x="36" y="48" width="4" height="8" rx="2" fill="#FF69B4"/>
  <rect x="44" y="48" width="4" height="8" rx="2" fill="#FF69B4"/>
  
  <!-- Coin Slot -->
  <rect x="30" y="32" width="4" height="1" rx="0.5" fill="#FF1493"/>
  
  <!-- Tail -->
  <path d="M 52 36 Q 56 32 52 28" stroke="#FF69B4" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Dollar Coin -->
  <circle cx="48" cy="20" r="6" fill="url(#coinGradient)" stroke="#DAA520" stroke-width="1"/>
  <text x="48" y="24" font-family="Arial, sans-serif" font-size="8" font-weight="bold" text-anchor="middle" fill="#8B4513">$</text>
</svg>
